name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  formula:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Style
        run: brew style Formula/prilog.rb

      - name: Tap
        run: brew tap prilog-ai/tap "$GITHUB_WORKSPACE"

      - name: Audit
        run: brew audit --strict --online --tap=prilog-ai/tap

      - name: Install
        run: brew install --build-from-source prilog-ai/tap/prilog

      - name: Test
        run: brew test prilog-ai/tap/prilog
